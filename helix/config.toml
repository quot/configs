# theme = "sonokai"
# theme = "nord-night"
# theme = "everforest_dark"
# theme = "onelight"
# theme = "flexoki_light"
theme = "modus_operandi"

[editor]
line-number = "relative"

[editor.cursor-shape]
insert = "bar"
select = "underline"

# [editor.file-picker]
# git-ignore = false
# git-global = false

[editor.soft-wrap]
enable = true

[editor.indent-guides]
render = true

[editor.whitespace.render]
newline = "all"
space = "none"
tab = "none"

[editor.whitespace.characters]
newline = "󱦳"
# newline = "󱞣"

[editor.file-picker]
hidden = false

[keys.normal]
"{" = "goto_prev_paragraph"
"}" = "goto_next_paragraph"
C-left = "jump_view_left"
C-right = "jump_view_right"
C-up = "jump_view_up"
C-down = "jump_view_down"

[keys.normal.space]
z = ":toggle gutters.line-numbers.min-width 48 3"
B = ":sh git log -n 5 --format='format:%%h (%%an: %%ar) %%s' --no-patch -L%{cursor_line},+1:%{buffer_name}"

[editor.gutters.line-numbers]
min-width = 48

[keys.select]
"{" = "goto_prev_paragraph"
"}" = "goto_next_paragraph"
