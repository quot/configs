use-grammars = { only = [ "apex", "soql", "sosl" ] }

[language-server]
ty = { command = "ty", args = ["server"] }
kotlin-lsp = { command = "kotlin-lsp", args = ["--stdio"] }

[[language]]
name = "git-config"
file-types = ["gitconfig", { glob = ".gitmodules" }, { glob = ".gitconfig" }, { glob = ".git/config" }, { glob = ".config/git/config" }]

[[language]]
name = "git-ignore"
file-types = ["gitignore", { glob = ".gitignore_global" }, { glob = "git/ignore" }, { glob = ".ignore" }, { glob = "CODEOWNERS" }, { glob = ".config/helix/ignore" }, { glob = ".helix/ignore" }, { glob = ".*ignore" }]

[[language]]
name = "html"
auto-format = false

[[language]]
name = "bash"
file-types = [ "zsh", {glob="zshrc"} ]

[[language]]
name = "python"
# language-servers = [ "pyright" ]
# language-servers = [ "basedpyright" ]
language-servers = [ "ty" ]


[[language]]
name = "kotlin"
language-servers = [ "kotlin-lsp" ]

[[language]]
name = "java"
indent = { tab-width = 4, unit = "    " }

# [language-server.kotlin-language-server]
