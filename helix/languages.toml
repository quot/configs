# Based on: https://github.com/neovim/nvim-lspconfig/blob/master/doc/configs.md#apex_ls
# Command setup: https://github.com/neovim/nvim-lspconfig/blob/master/lua/lspconfig/configs/apex_ls.lua
# Jar: https://github.com/forcedotcom/salesforcedx-vscode/tree/develop/packages/salesforcedx-vscode-apex/jars
[language-server.apex_ls]
command = "java"
args = [
  "-cp",
  "/Users/acote/.local/bin/apex-jorje-lsp.jar",
  "-Ddebug.internal.errors=true",
  "-Ddebug.semantic.errors=false",
  "-Ddebug.completion.statistics=false",
  "-Dlwc.typegeneration.disabled=true",
  "apex.jorje.lsp.ApexLanguageServerLauncher"
]

[[language]]
name = "apex"
scope = "source.apex"
file-types = [ "cls", "trigger", "apex" ]
language-servers = ["apex_ls"]
comment-tokens = ["//"]
block-comment-tokens = [ { start = "/*", end = "*/" } ]
# formatter = { command = "prettierd", args = ['--plugin', '/opt/homebrew/lib/node_modules/prettier-plugin-apex', '--stdin-filepath="%sh{echo "$(pwd)/%{buffer_name}"}"'] }

[[grammar]]
name = "apex"
source = { git = "https://github.com/aheber/tree-sitter-sfapex", rev = "3597575a429766dd7ecce9f5bb97f6fec4419d5d", subpath = "apex" }

[[language]]
name = "soql"
scope = "source.soql"
file-types = [ "soql" ]

[[grammar]]
name = "soql"
source = { git = "https://github.com/aheber/tree-sitter-sfapex", rev = "3597575a429766dd7ecce9f5bb97f6fec4419d5d", subpath = "soql" }

[[language]]
name = "sosl"
scope = "source.sosl"
file-types = [ "sosl" ]

[[grammar]]
name = "sosl"
source = { git = "https://github.com/aheber/tree-sitter-sfapex", rev = "3597575a429766dd7ecce9f5bb97f6fec4419d5d", subpath = "sosl" }
